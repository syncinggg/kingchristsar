<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>

    <!-- Deep navy background gradient -->
    <radialGradient id="bgGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#0e1830"/>
      <stop offset="100%" stop-color="#080c1a"/>
    </radialGradient>

    <!-- Blue-to-purple gradient for the "KM" letters -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4aa8ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Same gradient for the border ring -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4aa8ff" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4aa8ff" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Soft blue glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner noise / glare clip -->
    <clipPath id="roundClip">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>

  </defs>

  <!-- ── Base shape ── -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bgGrad)"/>

  <!-- ── Glare sweep (top-left highlight like glass) ── -->
  <ellipse cx="28" cy="22" rx="32" ry="18"
           fill="white" fill-opacity="0.045"
           clip-path="url(#roundClip)"/>

  <!-- ── Ambient bottom glow blob ── -->
  <ellipse cx="70" cy="82" rx="38" ry="24"
           fill="#4aa8ff" fill-opacity="0.07"
           clip-path="url(#roundClip)"/>

  <!-- ── Gradient border ring ── -->
  <rect x="1" y="1" width="98" height="98" rx="21.5" ry="21.5"
        fill="none"
        stroke="url(#borderGrad)"
        stroke-width="1.5"/>

  <!-- ── Inner hairline (glass depth) ── -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="20.5" ry="20.5"
        fill="none"
        stroke="white" stroke-opacity="0.06"
        stroke-width="0.75"/>

  <!-- ── "KM" initials with gradient fill and glow ── -->
  <text
    x="50" y="62"
    text-anchor="middle"
    font-family="'Syne', 'SF Pro Display', 'Segoe UI', Arial, sans-serif"
    font-size="42"
    font-weight="800"
    letter-spacing="-2"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >KM</text>

</svg>
